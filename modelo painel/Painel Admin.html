function App() {
  const [active, setActive] = useState("dash");
  const [modal, setModal] = useState(null);

  let page;
  if (active === "dash") page = <Dashboard />;
  else if (active === "questions") page = <QuestionsPage onAdd={()=>setModal("question")} />;
  else if (active === "users") page = <UsersPage onAdd={()=>setModal("user")} />;
  else if (active === "survey") page = <SurveyConfigPage onAddQuestion={()=>setModal("question")} />;
  else page = (
    <div className="card"><div className="card-body" style={{padding:48,textAlign:'center'}}>
      <div style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:24,marginBottom:6}}>Em construção</div>
      <div style={{color:'var(--ink-500)'}}>Esta seção do painel será disponibilizada em breve.</div>
    </div></div>
  );

  return (
    <>
      <div className="stripe" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
      <div className="app">
        <Sidebar active={active} setActive={setActive} />
        <div className="main">
          <Topbar />
          <div className="content">{page}</div>
        </div>
      </div>
      {modal === "question" && <NewQuestionModal onClose={()=>setModal(null)} />}
      {modal === "user" && <NewUserModal onClose={()=>setModal(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
